<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue JSON Form Builder Webcomponent</title>
        <style>
            :root {
                color-scheme: light;
                font-family:
                    "IBM Plex Sans",
                    "Segoe UI",
                    sans-serif;
                background:
                    radial-gradient(circle at top left, #f5f8ff 0, #eef3ea 38%, #f4efe4 100%);
                color: #172033;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
            }

            main {
                width: min(1400px, calc(100% - 32px));
                margin: 0 auto;
                padding: 32px 0 48px;
            }

            .frame {
                display: grid;
                gap: 24px;
            }

            .card {
                padding: 24px;
                border: 1px solid rgba(23, 32, 51, 0.1);
                border-radius: 24px;
                background: rgba(255, 255, 255, 0.82);
                box-shadow: 0 18px 48px rgba(23, 32, 51, 0.1);
                backdrop-filter: blur(10px);
            }

            .eyebrow {
                margin: 0 0 8px;
                font-size: 0.8rem;
                font-weight: 700;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: #a14f2a;
            }

            h1 {
                margin: 0 0 12px;
                font-size: clamp(2rem, 4vw, 3.5rem);
                line-height: 0.95;
            }

            p {
                margin: 0;
                max-width: 70ch;
                line-height: 1.6;
                color: #42506a;
            }

            code {
                padding: 0.15rem 0.35rem;
                border-radius: 6px;
                background: rgba(23, 32, 51, 0.06);
            }
        </style>
    </head>
    <body>
        <main class="frame">
            <section class="card">
                <p class="eyebrow">Standalone Host Page</p>
                <h1>Vue JSON Form Builder</h1>
                <p>
                    This page embeds the built webcomponent bundle directly. Build the package
                    first, then open this file from the package directory or serve it with any
                    static file server.
                </p>
                <p>
                    Expected bundle: <code>./dist/vue-json-form-builder.js</code>
                </p>
            </section>

            <section class="card">
                <vue-json-form-builder id="vjfb"></vue-json-form-builder>
            </section>
        </main>
        <script type="module" src="./dist/vue-json-form-builder.js"></script>
        <script>
            document.getElementById('vjfb').addEventListener('vjfbChange', (event) => {
                console.log(event);
            });
        </script>
    </body>
</html>
