name: Build And Test

on:
    push:
        branches:
            - 'main'
    workflow_dispatch:

permissions:
    contents: read
    checks: write

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node: [22, 24]
        name: Build on Node ${{ matrix.node }}
        steps:
            - uses: actions/checkout@v6
            - name: Cache turbo build setup
              uses: actions/cache@v5
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-
            - name: Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node }}
                  cache: yarn
            - run: yarn install --immutable
            - run: yarn run lint
            - run: yarn run build
    test-unit:
        needs: build
        runs-on: ubuntu-latest
        name: Unit Tests
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: recursive
            - name: Cache turbo build setup
              uses: actions/cache@v5
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-
            - name: Setup node
              uses: actions/setup-node@v6
              with:
                  cache: yarn
                  node-version: lts/*
            - run: yarn install --immutable
            - run: yarn run build
            - run: yarn test:unit
            - name: Upload report to GitHub Actions Artifacts
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@v7
              with:
                  name: unit-report
                  path: |
                      ./packages/*/test-results/*.xml
                  retention-days: 1
