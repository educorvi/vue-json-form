    test-e2e-webcomponent:
      needs: build
      runs-on: ubuntu-latest
      name: e2e Tests Webcomponent
      timeout-minutes: 60
      steps:
        - uses: actions/checkout@v6
          with:
            submodules: recursive
        - name: Cache turbo build setup
          uses: actions/cache@v5
          with:
            path: .turbo
            key: ${{ runner.os }}-turbo-${{ github.sha }}
            restore-keys: |
              ${{ runner.os }}-turbo-
        - name: Setup node
          uses: actions/setup-node@v6
          with:
            cache: yarn
            node-version: lts/*
        - name: Store Playwright's Version
          run: |
            PLAYWRIGHT_VERSION=$(npm ls @playwright/test | grep @playwright | sed 's/.*@//' | head -1)
            echo "Playwright's Version: $PLAYWRIGHT_VERSION"
            echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> $GITHUB_ENV

        - name: Cache Playwright Browsers for Playwright's Version
          id: cache-playwright-browsers
          uses: actions/cache@v5
          with:
            path: ~/.cache/ms-playwright
            key: playwright-browsers-${{ env.PLAYWRIGHT_VERSION }}
        - run: yarn install --immutable
        - run: yarn run build
        - name: Install Playwright Browsers
          run: yarn playwright install --with-deps
          working-directory: ./packages/webcomponent
        - name: Run Playwright tests
          run: npx playwright test --project chromium
          working-directory: ./packages/webcomponent
        - uses: actions/upload-artifact@v7
          if: always()
          with:
            name: playwright-report
            path: packages/webcomponent/playwright-report/
